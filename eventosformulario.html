<!-----------------------------------------------------FORMULARIO---------------------------------------------------------------------------------------------->





<form action="#" method="post" class="formulario">
    <h1>Formulario de Registro de Eventos</h1><br><br>

    <fieldset><br>

        <!-- 2 Cajas de texto -->
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required placeholder="Nombre"><br><br>

        <label for="nombre">Apellidos:</label>
        <input type="text" name="Apellidos" size=20 placeholder="Apellidos"><br><br>

        <label for="email">Correo electrónico:</label>
        <input type="text" id="email" name="email" required placeholder="E-mail"><br><br>







        <br>
        <!-- Lista desplegable -->
        <label for="pais">País:</label>
        <select id="pais" name="pais">
            <option value="espana">España</option>
            <option value="mexico">México</option>
            <option value="argentina">Estados Unidos</option>
        </select><br><br>




        <!-- Radio buttons -->
        <p>Género:</p>
        <input type="radio" id="hombre" name="genero" value="hombre">
        <label for="hombre">Hombre</label><br>

        <input type="radio" id="mujer" name="genero" value="mujer">
        <label for="mujer">Mujer</label><br>

        <input type="radio" id="otro" name="genero" value="otro">
        <label for="otro">Otro</label><br><br>



        <!-- Checkboxes -->
        <p>Intereses:</p>
        <input type="checkbox" id="deporte" name="intereses" value="deporte">
        <label for="deporte">Deporte</label><br>

        <input type="checkbox" id="musica" name="intereses" value="musica">
        <label for="musica">Música</label><br>

        <input type="checkbox" id="lectura" name="intereses" value="lectura">
        <label for="lectura">Lectura</label><br><br>


        
        <!-- Área de texto -->
        <label for="comentarios">Comentarios:</label><br>
        <textarea id="comentarios" name="comentarios" rows="4" cols="40"></textarea><br><br>



        <!-- Botones -->
        <input type="submit" value="Enviar">
        <input type="reset" value="Borrar">


    </fieldset><br>
</form>
